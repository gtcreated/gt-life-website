<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery 3 - GT Life</title>
    <link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2C1810">
    <link rel="apple-touch-icon" href="/images/app-icon-192.png"

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered"));
        }
    </script>
</head>
<body>
   <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo">← Back</a> 
            </div>
            
            <div class="nav-center">
                <a href="index.html">GT Life</a>
            </div>
            
            <div class="nav-right">
                <div class="theme-controls">
                    <button id="theme-toggle" class="theme-btn">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="gallery-section" style="padding-top: 10rem;">
            <h2 class="section-title">Gallery 3</h2>
            <p style="text-align: center; margin-bottom: 3rem;">Capturing the unseen.</p>
            
            <div class="photo-grid">
                <div class="photo-item card-reveal"><img src="images/g3-1.jpg" alt="Photo 1"></div>
                <div class="photo-item card-reveal"><img src="images/g3-2.jpg" alt="Photo 2"></div>
                <div class="photo-item card-reveal"><img src="images/g3-3.jpg" alt="Photo 3"></div>
                <div class="photo-item card-reveal"><img src="images/g3-4.jpg" alt="Photo 4"></div>
            </div>
        </section>
    </main>

    <div id="photoModal" class="lightbox-modal">
        <span class="close-lightbox">&times;</span>
        <a class="prev-lightbox" id="prevPhoto">&#10094;</a>
        <a class="next-lightbox" id="nextPhoto">&#10095;</a>
        <img class="lightbox-content" id="lightboxImg">
        <div class="lightbox-caption">
            <a href="#" id="smart-comment-btn">Drop a comment on this shot 💬</a>
        </div>
    </div>

    <section id="comments" class="gallery-section moderation-section" style="padding-top: 0; padding-bottom: 5rem;">
        <div class="comment-widget-container">
            <iframe data-tally-src="https://tally.so/embed/81PDaY?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="400" frameborder="0" marginheight="0" marginwidth="0" title="GT Life Comments"></iframe>
            <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
