<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Vlogs - GT Life</title>
    <link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2C1810">
    <link rel="apple-touch-icon" href="images/app-icon-192.png">

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered"));
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo">← Back</a> 
            </div>
            
            <div class="nav-center">
                <a href="index.html">GT Life</a>
            </div>
            
            <div class="nav-right">
                <div class="theme-controls">
                    <button id="theme-toggle" class="theme-btn">🌙</button>
                </div>
            </div>
        </div>
    </nav>
    <main>
        <section class="gallery-section" style="padding-top: 10rem;">
            <h2 class="section-title">Travel Vlogs</h2>
            <p style="text-align: center; margin-bottom: 3rem;">Select a destination.</p>
            
            <div class="grid-container">
                <a href="jodhpur-vlogs.html" class="tile-link card-reveal">
                    <div class="video-card">
                        <div class="thumbnail-container">
                            <img src="images\jodhpur-vlogs.jpg" alt="Jodhpur Vlogs">
                            <div class="hover-overlay">
                                <span class="hover-title">Jodhpur Vlogs</span>
                            </div>
                        </div>
                        <div class="card-title-below">Jodhpur Vlogs</div>
                    </div>
                </a>

                <a href="pune-vlogs.html" class="tile-link card-reveal">
                    <div class="video-card">
                        <div class="thumbnail-container">
                            <img src="images\pune-vlogs.jpg" alt="Pune Vlogs">
                            <div class="hover-overlay">
                                <span class="hover-title">Pune Vlogs</span>
                            </div>
                        </div>
                        <div class="card-title-below">Pune Vlogs</div>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
